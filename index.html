<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  min-height:100vh;
  background-color: #8B0000;
  background-image:
    repeating-linear-gradient(45deg, rgba(180,0,0,0.35) 0px, rgba(180,0,0,0.35) 2px, transparent 2px, transparent 60px),
    repeating-linear-gradient(-45deg, rgba(180,0,0,0.35) 0px, rgba(180,0,0,0.35) 2px, transparent 2px, transparent 60px);
}
input { color:#fff !important; }
input::placeholder { color:rgba(255,255,255,0.4); }
@keyframes pop { 0%{transform:scale(0.8);opacity:0} 100%{transform:scale(1);opacity:1} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(167,139,250,0.6)} 50%{box-shadow:0 0 0 10px rgba(167,139,250,0)} }
@keyframes float { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-8px) rotate(5deg)} }
@keyframes glow { 0%,100%{box-shadow:0 0 6px 2px rgba(255,215,0,0.7)} 50%{box-shadow:0 0 14px 5px rgba(255,215,0,1)} }
@keyframes spin-slow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.corner-medallion {
  position:fixed; width:100px; height:100px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:2.4rem;
  background:radial-gradient(circle,rgba(180,20,20,0.85),rgba(120,0,0,0.9));
  border:3px solid rgba(255,200,50,0.4);
  box-shadow:0 0 20px rgba(0,0,0,0.5),inset 0 0 15px rgba(255,150,0,0.15);
  z-index:0; pointer-events:none; animation:float 4s ease-in-out infinite;
}
.corner-medallion.tl{top:10px;left:10px;animation-delay:0s}
.corner-medallion.tr{top:10px;right:10px;animation-delay:0.5s}
.corner-medallion.bl{bottom:10px;left:10px;animation-delay:1s}
.corner-medallion.br{bottom:10px;right:10px;animation-delay:1.5s}
.corner-medallion.ml{top:50%;left:10px;transform:translateY(-50%);animation-delay:0.3s}
.corner-medallion.mr{top:50%;right:10px;transform:translateY(-50%);animation-delay:0.8s}

.gold-frame{position:fixed;inset:8px;border:2px solid rgba(255,200,50,0.25);border-radius:12px;pointer-events:none;z-index:0}
.gold-frame::before{content:'';position:absolute;inset:4px;border:1px solid rgba(255,200,50,0.12);border-radius:8px}

.content-wrap{position:relative;z-index:1;min-height:100vh;padding:12px;display:flex;flex-direction:column;align-items:center;font-family:'Segoe UI',sans-serif}

/* Board cell styles */
.cell {
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1px;
  min-height: 36px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
  cursor: default;
}
.cell-num {
  font-size: 0.42rem;
  font-weight: 900;
  line-height: 1;
  position: absolute;
  top: 1px;
  left: 2px;
  z-index: 2;
  text-shadow: 0 0 3px rgba(0,0,0,0.6);
}
.cell-emoji {
  font-size: 1rem;
  line-height: 1;
  z-index: 2;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
}
.cell-players {
  display: flex;
  gap: 1px;
  flex-wrap: wrap;
  justify-content: center;
  z-index: 3;
  position: absolute;
  bottom: 1px;
}
.player-token {
  width: 9px; height: 9px;
  border-radius: 50%;
  border: 1.5px solid white;
  box-shadow: 0 0 4px rgba(0,0,0,0.6);
}
.cell-landed {
  animation: glow 0.8s ease-in-out infinite !important;
  border: 2px solid #FFD700 !important;
  z-index: 5;
}
</style>

  { q:"Монгол цаг тооллын жаран жилийн тооллыг өөрөөр юу гэж нэрлэдэг вэ?", correct:"Жарны тоолол", options:["Их тоолол","Жарны тоолол","Нарны тоолол","Одны тоолол"] },
  { q:"Монгол цаг тоолол аль орны соёлтой ойр холбоотой хөгжсөн бэ?", correct:"Төвд ба Хятад", options:["Энэтхэг","Хятад","Төвд","Төвд ба Хятад"] },
  { q:"Монгол билгийн тоолол юунд үндэслэдэг вэ?", correct:"Сар", options:["Нар","Сар","Од","Салхи"] },
  { q:"Монгол цаг тоололд сар хэзээ эхэлдэг вэ?", correct:"Шинэ сараар", options:["Бүтэн сараар","Шинэ сараар","Нар жаргах үед","Нар мандах үед"] },
  { q:"Монгол цаг тоололд зарим жилд ордог илүү сарыг юу гэж нэрлэдэг вэ?", correct:"Илүү сар", options:["Илүү сар","Нэмэлт сар","Давхар сар","Илүүдэл сар"] },
  { q:"Монгол цаг тоололд жилүүдийг юу хослуулж нэрлэдэг вэ?", correct:"Амьтан ба махбодь", options:["Амьтан ба махбодь","Амьтан ба өнгө","Сар ба улирал","Нар ба од"] },
  { q:"Таван махбодийн мөчлөг хэдэн жилд давтагддаг вэ?", correct:"10", options:["5","10","12","60"] },
  { q:"Монгол уламжлалт цагийн нэг хэсэг хэдэн цагтай тэнцэх вэ?", correct:"2 цаг", options:["1 цаг","2 цаг","3 цаг","4 цаг"] },
  { q:"Монгол цаг тооллын судрыг хэн ихээр хөгжүүлсэн бэ?", correct:"Лам нар", options:["Лам нар","Малчид","Цэргүүд","Хаад"] },
  { q:"Монгол цаг тоололд улирлын өөрчлөлт юутай холбоотой вэ?", correct:"Дээрх бүгд", options:["Нар","Сар","Байгаль","Дээрх бүгд"] },
  { q:"Монгол цаг тооллыг өнөө үед хаана ашигладаг вэ?", correct:"Дээрх бүгд", options:["Баяр ёслол","Шашны зан үйл","Зурхай","Дээрх бүгд"] },
  { q:"Монголчууд жил орчмыг ажиглахдаа юуг их анхаардаг байсан бэ?", correct:"Дээрх бүгд", options:["Малын зан авир","Байгалийн өөрчлөлт","Сарны хэлбэр","Дээрх бүгд"] },
  { q:"Монгол цаг тоолол нүүдлийн амьдралд яагаад хэрэгтэй байсан бэ?", correct:"Дээрх бүгд", options:["Цаг агаар мэдэх","Нүүдлийн хугацааг төлөвлөх","Мал аж ахуй зохицуулах","Дээрх бүгд"] },
  { q:"Монгол цаг тоололд 'жаран' гэдэг нь юуг илэрхийлдэг вэ?", correct:"60 жил", options:["30 жил","50 жил","60 жил","70 жил"] },
  { q:"Монгол цаг тоололд жилүүдийн нэршил юунаас үүсдэг вэ?", correct:"Амьтан ба махбодийн хослол", options:["Амьтан","Махбодь","Амьтан ба махбодийн хослол","Сар"] },
  { q:"Монгол цаг тоололд билгийн сар ихэвчлэн хэдэн хоногтой вэ?", correct:"29 эсвэл 30", options:["28","29","29 эсвэл 30","31"] },
  { q:"Монгол уламжлалт цагийн хуваарьт нэг хоног хэдэн цагтай тэнцэх вэ?", correct:"24", options:["12","24","36","48"] },
  { q:"Монгол цаг тоололд хаврын эхэн сар аль нь вэ?", correct:"Гуравдугаар сар", options:["Нэгдүгээр сар","Хоёрдугаар сар","Гуравдугаар сар","Дөрөвдүгээр сар"] },
  { q:"Монголчууд цаг тооллыг юуг ажиглан тогтоож байсан бэ?", correct:"Дээрх бүгд", options:["Сар","Нар","Байгаль","Дээрх бүгд"] },
  { q:"Монгол цаг тоололд улирлын өөрчлөлт юунд нөлөөлдөг вэ?", correct:"Дээрх бүгд", options:["Мал аж ахуй","Нүүдэл","Амьдралын хэв маяг","Дээрх бүгд"] },
  { q:"Монгол цаг тоололд Цагаан сар ямар утгатай вэ?", correct:"Шинэ жилийн баяр", options:["Ургацын баяр","Шинэ жилийн баяр","Зуны баяр","Намрын баяр"] },
  { q:"Монгол цаг тооллын мэдлэгийг уламжлал ёсоор хэн хадгалж ирсэн бэ?", correct:"Дээрх бүгд", options:["Лам нар","Эрдэмтэд","Ахмад хүмүүс","Дээрх бүгд"] },
  { q:"Монгол цаг тооллын судалгаа аль шинжлэх ухаантай нягт холбоотой вэ?", correct:"Дээрх бүгд", options:["Одон орон","Математик","Соёл судлал","Дээрх бүгд"] },
];

const SQUARE_QUESTIONS = {};
for (let i=1;i<=70;i++) SQUARE_QUESTIONS[i]=ALL_QUESTIONS[(i-1)%ALL_QUESTIONS.length];

const SPECIAL_SQUARES = {
  10:{type:"forward", amount:3,icon:"⭐",label:"Азтай! 3 нүүдэл урагш!"},
  20:{type:"forward", amount:2,icon:"🌟",label:"Сайн! 2 нүүдэл урагш!"},
  32:{type:"backward",amount:4,icon:"🐢",label:"4 нүүдэл ухарна!"},
  45:{type:"forward", amount:3,icon:"🦅",label:"Хурдан! 3 нүүдэл урагш!"},
  55:{type:"backward",amount:5,icon:"🌀",label:"5 нүүдэл ухарна!"},
  62:{type:"forward", amount:4,icon:"🎯",label:"Онов! 4 нүүдэл урагш!"},
};

const COLORS=[{bg:"#E74C3C"},{bg:"#3498DB"},{bg:"#2ECC71"},{bg:"#F39C12"}];

function generateBoard(){
  const rows=8,cols=10;let num=1,pos=[];
  for(let r=rows-1;r>=0;r--){
    if((rows-1-r)%2===0){for(let c=0;c<cols;c++){if(num<=70)pos.push({r,c,n:num++});}}
    else{for(let c=cols-1;c>=0;c--){if(num<=70)pos.push({r,c,n:num++});}}
  }
  return pos;
}
const boardCells=generateBoard();
const {useState}=React;
function shuffle(arr){return[...arr].sort(()=>Math.random()-0.5);}

function BoardCell({n, playersHere, isLanded}){
  const theme = CELL_THEMES[n] || {emoji:"🌟", grad:"linear-gradient(135deg,#444,#666)", num:"#fff"};
  const sp = SPECIAL_SQUARES[n];
  return (
    <div className={`cell${isLanded?" cell-landed":""}`}
      style={{
        gridRow: boardCells.find(b=>b.n===n)?.r+1,
        gridColumn: boardCells.find(b=>b.n===n)?.c+1,
        background: theme.grad,
        border: isLanded?"2px solid #FFD700": sp?"2px solid rgba(255,255,255,0.5)":"1px solid rgba(0,0,0,0.2)",
        boxShadow: isLanded?"0 0 12px #FFD700": playersHere.length>0?"0 0 8px rgba(255,215,0,0.8)":"0 2px 4px rgba(0,0,0,0.3)",
      }}>
      <span className="cell-num" style={{color:theme.num}}>{n}</span>
      <span className="cell-emoji">{theme.emoji}</span>
      <div className="cell-players">
        {playersHere.map((p,pi)=>(
          <div key={pi} className="player-token"
            style={{background:p.color.bg, animation:isLanded?"bounce 0.7s ease infinite":""}}/>
        ))}
      </div>
    </div>
  );
}

function App(){
  const [players,setPlayers]=useState([{name:"Тоглогч 1",pos:0,color:COLORS[0]},{name:"Тоглогч 2",pos:0,color:COLORS[1]}]);
  const [playerCount,setPC]=useState(2);
  const [currentPlayer,setCP]=useState(0);
  const [diceValue,setDice]=useState(null);
  const [rolling,setRolling]=useState(false);
  const [phase,setPhase]=useState("setup");
  const [question,setQuestion]=useState(null);
  const [selected,setSelected]=useState(null);
  const [result,setResult]=useState(null);
  const [names,setNames]=useState(["Тоглогч 1","Тоглогч 2","Тоглогч 3","Тоглогч 4"]);
  const [winner,setWinner]=useState(null);
  const [special,setSpecial]=useState(null);
  const [landed,setLanded]=useState(null);

  const diceEmoji=["","⚀","⚁","⚂","⚃","⚄","⚅"];

  const nextTurn=()=>{setPhase("playing");setQuestion(null);setResult(null);setSelected(null);setLanded(null);setCP(p=>(p+1)%playerCount);};

  const showQuestion=(sq)=>{
    const raw=SQUARE_QUESTIONS[sq]||ALL_QUESTIONS[0];
    setQuestion({...raw,shuffledOptions:shuffle(raw.options)});
    setSelected(null);setResult(null);setPhase("question");
  };

  const rollDice=()=>{
    if(rolling||phase!=="playing")return;
    setRolling(true);let count=0;
    const iv=setInterval(()=>{
      setDice(Math.ceil(Math.random()*6));
      if(++count>=10){
        clearInterval(iv);
        const final=Math.ceil(Math.random()*6);
        setDice(final);setRolling(false);
        setPlayers(prev=>{
          const upd=[...prev];const p={...upd[currentPlayer]};
          p.pos=Math.min(p.pos+final,70);upd[currentPlayer]=p;
          if(p.pos>=70){setWinner(currentPlayer);setPhase("winner");return upd;}
          setLanded(p.pos);
          if(SPECIAL_SQUARES[p.pos]){setSpecial({...SPECIAL_SQUARES[p.pos]});setPhase("special");}
          else setPhase("moved");
          return upd;
        });
      }
    },80);
  };

  const handleSpecial=()=>{
    const sp=special;let np;
    setPlayers(prev=>{
      const upd=[...prev];const p={...upd[currentPlayer]};
      p.pos=sp.type==="forward"?Math.min(p.pos+sp.amount,70):Math.max(p.pos-sp.amount,1);
      np=p.pos;upd[currentPlayer]=p;
      if(p.pos>=70){setWinner(currentPlayer);setPhase("winner");return upd;}
      return upd;
    });
    setSpecial(null);
    setTimeout(()=>{setLanded(np);setPhase("moved");},100);
  };

  const pick=(opt)=>{
    if(result)return;
    setSelected(opt);
    const ok=opt===question.correct;
    setResult(ok?"correct":"wrong");
    if(ok){setTimeout(nextTurn,2000);}
    else{
      setPlayers(prev=>{const upd=[...prev];const p={...upd[currentPlayer]};p.pos=Math.max(p.pos-1,1);upd[currentPlayer]=p;return upd;});
      setTimeout(nextTurn,2500);
    }
  };

  const startGame=()=>{
    const ps=Array.from({length:playerCount},(_,i)=>({name:names[i]||`Тоглогч ${i+1}`,pos:0,color:COLORS[i]}));
    setPlayers(ps);setCP(0);setPhase("playing");setWinner(null);setDice(null);setLanded(null);
  };

  const optStyle=(opt)=>{
    const base={padding:"10px 14px",borderRadius:"10px",cursor:result?"default":"pointer",fontWeight:600,fontSize:"0.88rem",marginBottom:"7px",width:"100%",border:"2px solid",textAlign:"left",transition:"all 0.2s"};
    if(!result)return{...base,background:"rgba(0,0,0,0.35)",borderColor:"rgba(255,200,50,0.3)",color:"#fff"};
    if(opt===question.correct)return{...base,background:"rgba(46,204,113,0.25)",borderColor:"#2ECC71",color:"#2ECC71"};
    if(opt===selected)return{...base,background:"rgba(231,76,60,0.25)",borderColor:"#E74C3C",color:"#FF6B6B"};
    return{...base,background:"rgba(0,0,0,0.2)",borderColor:"rgba(255,255,255,0.08)",color:"#666"};
  };

  const card={background:"rgba(100,0,0,0.72)",backdropFilter:"blur(8px)",border:"1px solid rgba(255,200,50,0.35)",borderRadius:"14px"};
  const inGame=["playing","moved","special","question"].includes(phase);

  return(
    <div className="content-wrap">
      {/* Header */}
      <div style={{textAlign:"center",marginBottom:"10px"}}>
        <div style={{fontSize:"1.4rem",fontWeight:900,color:"#FFD700",textShadow:"0 2px 12px rgba(0,0,0,0.8),0 0 30px rgba(255,180,0,0.5)",letterSpacing:"2px",marginBottom:"2px"}}>
          🎲 ТА БИТГИЙ УУРЛААРАЙ 🎲
        </div>
        <div style={{color:"#FFCC70",fontSize:"0.75rem",textShadow:"0 1px 4px rgba(0,0,0,0.8)"}}>
          Монгол цаг тооллын тоглоом
        </div>
      </div>

      {/* SETUP */}
      {phase==="setup"&&(
        <div style={{...card,padding:"22px",maxWidth:"380px",width:"100%",animation:"pop 0.3s ease"}}>
          <div style={{color:"#FFD700",fontWeight:700,marginBottom:"14px",textAlign:"center",fontSize:"1rem"}}>👥 Тоглогчдын тоо</div>
          <div style={{display:"flex",gap:"10px",justifyContent:"center",marginBottom:"16px"}}>
            {[2,3,4].map(n=>(
              <button key={n} onClick={()=>setPC(n)} style={{padding:"9px 20px",borderRadius:"9px",border:`2px solid ${playerCount===n?"#FFD700":"rgba(255,200,50,0.3)"}`,background:playerCount===n?"#FFD700":"rgba(0,0,0,0.3)",color:playerCount===n?"#8B0000":"#fff",fontWeight:700,cursor:"pointer"}}>{n}</button>
            ))}
          </div>
          {Array.from({length:playerCount},(_,i)=>(
            <div key={i} style={{marginBottom:"8px",display:"flex",alignItems:"center",gap:"10px"}}>
              <div style={{width:15,height:15,borderRadius:"50%",background:COLORS[i].bg,flexShrink:0,boxShadow:`0 0 8px ${COLORS[i].bg}`}}/>
              <input value={names[i]} onChange={e=>{const n=[...names];n[i]=e.target.value;setNames(n);}} placeholder={`Тоглогч ${i+1}`} style={{flex:1,padding:"9px 12px",borderRadius:"9px",border:"1px solid rgba(255,200,50,0.3)",background:"rgba(0,0,0,0.3)",fontSize:"0.9rem",outline:"none"}}/>
            </div>
          ))}
          <button onClick={startGame} style={{width:"100%",padding:"13px",borderRadius:"11px",background:"linear-gradient(135deg,#FFD700,#FF8C00)",border:"none",color:"#8B0000",fontSize:"1rem",fontWeight:900,cursor:"pointer",marginTop:"12px",boxShadow:"0 4px 16px rgba(0,0,0,0.4)"}}>🎮 ТОГЛООМ ЭХЛЭХ</button>
        </div>
      )}

      {/* GAME */}
      {inGame&&(
        <div style={{width:"100%",maxWidth:"700px"}}>
          {/* Players bar */}
          <div style={{display:"flex",gap:"6px",marginBottom:"8px",flexWrap:"wrap",justifyContent:"center"}}>
            {players.slice(0,playerCount).map((p,i)=>(
              <div key={i} style={{padding:"5px 11px",borderRadius:"9px",background:i===currentPlayer?p.color.bg:"rgba(0,0,0,0.5)",border:`2px solid ${i===currentPlayer?"#FFD700":"rgba(255,200,50,0.25)"}`,color:"#fff",fontWeight:i===currentPlayer?700:400,display:"flex",alignItems:"center",gap:"6px",fontSize:"0.82rem",transition:"all 0.3s"}}>
                <span>●</span><span>{p.name}</span>
                <span style={{background:"rgba(0,0,0,0.4)",borderRadius:"4px",padding:"1px 5px",fontSize:"0.7rem"}}>{p.pos}/70</span>
              </div>
            ))}
          </div>

          {/* BOARD */}
          <div style={{...card,padding:"8px",marginBottom:"10px",overflowX:"auto"}}>
            {/* Legend */}
            <div style={{display:"flex",gap:"8px",marginBottom:"6px",flexWrap:"wrap",justifyContent:"center",fontSize:"0.65rem",color:"#FFCC70"}}>
              <span>⭐🌟🦅🎯 = урагш нүүнэ</span>
              <span>🐢🌀 = ухарна</span>
              <span>🏆 = Ялалт!</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:"3px",minWidth:"300px"}}>
              {boardCells.map(({r,c,n})=>{
                const here=players.slice(0,playerCount).filter(p=>p.pos===n);
                const isL=n===landed;
                return <BoardCell key={n} n={n} playersHere={here} isLanded={isL}/>;
              })}
            </div>
          </div>

          {/* ROLL */}
          {phase==="playing"&&(
            <div style={{...card,padding:"18px",textAlign:"center"}}>
              <div style={{color:"#FFD700",fontWeight:700,marginBottom:"8px"}}>{players[currentPlayer]?.name}-ийн ээлж</div>
              <div style={{fontSize:"3rem",marginBottom:"10px"}}>{diceValue?diceEmoji[diceValue]:"🎲"}</div>
              <button onClick={rollDice} disabled={rolling} style={{padding:"12px 34px",borderRadius:"11px",background:rolling?"rgba(0,0,0,0.3)":"linear-gradient(135deg,#FFD700,#FF8C00)",border:"none",color:rolling?"#888":"#8B0000",fontSize:"1rem",fontWeight:900,cursor:rolling?"not-allowed":"pointer",boxShadow:"0 3px 12px rgba(0,0,0,0.4)"}}>
                {rolling?"⏳ Хаяж байна...":"🎲 ШОО ХАЯХ"}
              </button>
            </div>
          )}

          {/* MOVED */}
          {phase==="moved"&&(
            <div style={{...card,padding:"20px",textAlign:"center",borderColor:"rgba(255,215,0,0.5)",animation:"pop 0.3s ease"}}>
              <div style={{fontSize:"2.5rem",marginBottom:"4px"}}>{diceEmoji[diceValue]}</div>
              <div style={{color:"#FFD700",fontSize:"1.3rem",fontWeight:900,marginBottom:"4px"}}>Шоо: {diceValue}</div>
              <div style={{color:"#fff",fontSize:"0.9rem",marginBottom:"4px"}}>
                <span style={{color:players[currentPlayer]?.color.bg,fontWeight:700}}>{players[currentPlayer]?.name}</span>{" → "}
                <span style={{color:"#FFD700",fontWeight:700}}>{landed}-р нүд </span>
                <span style={{fontSize:"1.2rem"}}>{CELL_THEMES[landed]?.emoji}</span>
              </div>
              <div style={{color:"#FFCC70",fontSize:"0.78rem",marginBottom:"16px"}}>Асуулт бэлэн байна!</div>
              <button onClick={()=>showQuestion(landed)} style={{padding:"12px 32px",borderRadius:"11px",background:"linear-gradient(135deg,#A78BFA,#7C3AED)",border:"none",color:"#fff",fontSize:"0.95rem",fontWeight:900,cursor:"pointer",animation:"pulse 1.5s ease infinite",boxShadow:"0 3px 12px rgba(0,0,0,0.4)"}}>
                📋 Асуулт харах
              </button>
            </div>
          )}

          {/* SPECIAL */}
          {phase==="special"&&special&&(
            <div style={{...card,padding:"20px",textAlign:"center",borderColor:special.type==="forward"?"#2ECC71":"#E74C3C",animation:"pop 0.3s ease"}}>
              <div style={{fontSize:"2.5rem",marginBottom:"6px"}}>{special.icon}</div>
              <div style={{color:"#FFD700",fontSize:"1.1rem",fontWeight:700,marginBottom:"6px"}}>{special.label}</div>
              <div style={{color:"#FFCC70",fontSize:"0.78rem",marginBottom:"14px"}}>Дараа нь асуулт хариулна</div>
              <button onClick={handleSpecial} style={{padding:"10px 26px",borderRadius:"10px",background:"linear-gradient(135deg,#FFD700,#FF8C00)",border:"none",color:"#8B0000",fontWeight:700,cursor:"pointer"}}>Үргэлжлүүлэх →</button>
            </div>
          )}

          {/* QUESTION */}
          {phase==="question"&&question&&(
            <div style={{...card,padding:"18px",animation:"pop 0.3s ease"}}>
              <div style={{color:"#FFCC70",fontSize:"0.73rem",marginBottom:"8px",textAlign:"center"}}>
                {CELL_THEMES[landed]?.emoji} {players[currentPlayer]?.name} — <span style={{color:"#FFD700"}}>{landed}-р нүдний асуулт</span>
              </div>
              <div style={{color:"#fff",fontSize:"0.98rem",fontWeight:600,marginBottom:"14px",textAlign:"center",lineHeight:1.55}}>{question.q}</div>
              {question.shuffledOptions.map((opt,i)=>(
                <button key={i} onClick={()=>pick(opt)} style={optStyle(opt)}>
                  <span style={{marginRight:"8px",opacity:0.6,fontWeight:700}}>{["A","B","C","D"][i]})</span>
                  {opt}
                  {result&&opt===question.correct&&" ✅"}
                  {result&&opt===selected&&opt!==question.correct&&" ❌"}
                </button>
              ))}
              {result==="correct"&&<div style={{textAlign:"center",marginTop:"8px",color:"#2ECC71",fontWeight:700,animation:"pop 0.3s ease"}}>🎉 Зөв хариулт!</div>}
              {result==="wrong"&&<div style={{textAlign:"center",marginTop:"8px",color:"#FF6B6B",fontWeight:700,animation:"pop 0.3s ease"}}>❌ Буруу! 1 нүүдэл ухарлаа. Зөв: <span style={{color:"#FFD700"}}>{question.correct}</span></div>}
            </div>
          )}
        </div>
      )}

      {/* WINNER */}
      {phase==="winner"&&winner!==null&&(
        <div style={{...card,textAlign:"center",padding:"36px",maxWidth:"360px",width:"100%",borderColor:"rgba(255,215,0,0.6)",animation:"pop 0.4s ease",boxShadow:"0 0 40px rgba(255,150,0,0.3)"}}>
          <div style={{fontSize:"4rem",marginBottom:"10px"}}>🏆</div>
          <div style={{color:"#FFD700",fontSize:"1.8rem",fontWeight:900,marginBottom:"6px"}}>{players[winner]?.name}</div>
          <div style={{color:"#fff",fontSize:"1rem",marginBottom:"20px"}}>ТОГЛООМЫГ ДУУСГАЛАА!</div>
          <button onClick={()=>setPhase("setup")} style={{padding:"13px 36px",borderRadius:"11px",background:"linear-gradient(135deg,#FFD700,#FF8C00)",border:"none",color:"#8B0000",fontWeight:900,fontSize:"1rem",cursor:"pointer"}}>🔄 Дахин тоглох</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
